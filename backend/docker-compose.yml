version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: brightpath_postgres
    environment:
      POSTGRES_USER: brightpath_user
      POSTGRES_PASSWORD: brightpath_password
      POSTGRES_DB: brightpath_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
